<section class="pop-up-container">
    <form action="" class="pop-up-form">
        <div class="form-header">Set Custom Bg</div>
        <div class="bg-presets">
            <div class="bg-presets-preview  p1">
                <img src="./assets/earth.fe723a60.jpg" alt="earth">
            </div>
            <div class="bg-presets-preview  p2">
                <img src="./assets/basketball_on_court.9415bf31.jpg" alt="basketball_on_court">
            </div>
            <div class="bg-presets-preview  p3">
                <img src="./assets/ship_sky_balloons.e1aedc8f.jpg" alt="ship_sky_balloons">
            </div>
            <div class="bg-presets-preview  p4">
                <img src="./assets/goku.8aacb2a1.jpg" alt="goku">
            </div>
            <div class="bg-presets-preview  p5">
                <img src="./assets/wait_impatient.e2f299b4.gif" alt="wait impatiently">
            </div>
            <div class="bg-presets-preview  upload-preview"><label for="upload"><i class="fas fa-plus fa-xl"></i></label></div>
        </div>
        <div>
            <label for="upload-info">Uploaded image must be less than 3mb &nbsp;</label>
            <input type="file" placeholder="pic.png" id="upload" accept="image/*">
        </div>
        <div class="reset"><button type="button">Restore default</button></div>
        <div class="close-form"><button type="button">Close</button></div>        
    </form>
</section>
